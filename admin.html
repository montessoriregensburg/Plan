<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Info-Board Admin</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; }
        .form-group { margin-bottom: 25px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; background: var(--bg); border: 1px solid #334155; color: white; border-radius: 8px; margin-bottom: 10px; }
        .info-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #22c55e; color: white; }
        .btn-send { background: var(--accent); color: var(--bg); width: 100%; font-size: 1.2rem; margin-top: 20px; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Info-Board Editor</h1>

    <div class="form-group">
        <label>Haupt-Info (Große Slide)</label>
        <textarea id="mainInfo" placeholder="Allgemeine Nachricht für die Haupt-Slide..."></textarea>
    </div>

    <div class="form-group">
        <label>Kurzmeldungen / Wer meldet was?</label>
        <div id="msgContainer">
            <div class="info-row">
                <input type="text" class="msg-who" placeholder="Von wem?">
                <input type="text" class="msg-text" placeholder="Was?">
                <button class="btn" style="background:#ef4444" onclick="this.parentElement.remove()">X</button>
            </div>
        </div>
        <button class="btn btn-add" onclick="addMsgRow()">+ Meldung hinzufügen</button>
    </div>

    <button class="btn btn-send" onclick="sendData()">DATEN PER E-MAIL SENDEN</button>
    <div id="status"></div>
</div>

<script>
    // INITIALISIERUNG EMAILJS
    (function(){
        emailjs.init("DEINE_PUBLIC_KEY"); // Ersetzen!
    })();

    function addMsgRow() {
        const div = document.createElement('div');
        div.className = 'info-row';
        div.innerHTML = `
            <input type="text" class="msg-who" placeholder="Von wem?">
            <input type="text" class="msg-text" placeholder="Was?">
            <button class="btn" style="background:#ef4444" onclick="this.parentElement.remove()">X</button>
        `;
        document.getElementById('msgContainer').appendChild(div);
    }

    function sendData() {
        const status = document.getElementById('status');
        status.innerText = "Sende...";

        // JSON zusammenbauen
        const messages = [];
        document.querySelectorAll('.info-row').forEach(row => {
            const who = row.querySelector('.msg-who').value;
            const text = row.querySelector('.msg-text').value;
            if(who && text) messages.push({ who, text });
        });

        const jsonData = {
            infoSlideText: document.getElementById('mainInfo').value,
            shortMessages: messages,
            timestamp: new Date().toLocaleString()
        };

        const templateParams = {
            message: JSON.stringify(jsonData, null, 4),
            to_name: "Admin",
            subject: "Update für Info-Board"
        };

        emailjs.send('lernarchiv', 'template_ezdxxvk', templateParams)
            .then(() => {
                status.style.color = "#22c55e";
                status.innerText = "Erfolgreich gesendet! Check dein Postfach.";
            }, (err) => {
                status.style.color = "#ef4444";
                status.innerText = "Fehler: " + JSON.stringify(err);
            });
    }
</script>
</body>
</html>
