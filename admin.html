<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Info-Board Einreichung</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        label { display: block; margin-bottom: 12px; color: #94a3b8; font-weight: bold; }
        
        /* Flex-Layout für die Eingabezeilen */
        .info-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        input { padding: 12px; background: var(--bg); border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        
        /* Spaltenbreiten */
        .msg-who { flex: 2; min-width: 120px; }
        .msg-class { flex: 1; min-width: 80px; }
        .msg-text { flex: 3; min-width: 180px; }
        .msg-until { flex: 1.5; min-width: 130px; }

        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-add { background: #22c55e; color: white; width: 100%; margin-top: 10px; }
        .btn-send { background: var(--accent); color: var(--bg); width: 100%; font-size: 1.2rem; margin-top: 20px; text-transform: uppercase; }
        .btn-del { background: #ef4444; color: white; height: 42px; width: 42px; flex-shrink: 0; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Info einreichen</h1>

    <div class="form-group">
        <label>Neue Meldungen</label>
        <div id="msgContainer">
            <div class="info-row">
                <input type="text" class="msg-who" placeholder="Name">
                <input type="text" class="msg-class" placeholder="Klasse">
                <input type="text" class="msg-text" placeholder="Grund / Nachricht (mit Datum bis wann)">
                <input type="date" class="msg-until" title="Gültig bis (fürs automatische Entfernen)">
                <button class="btn btn-del" onclick="this.parentElement.remove()">✕</button>
            </div>
        </div>
        <button class="btn btn-add" onclick="addMsgRow()">+ Weitere Meldung hinzufügen</button>
    </div>

    <button class="btn btn-send" onclick="sendData()">Jetzt Einreichen</button>
    <div id="status"></div>
</div>

<script>
    (function(){
        emailjs.init("2IcY8ndM7LrI8e66W");
    })();

    function addMsgRow() {
        const div = document.createElement('div');
        div.className = 'info-row';
        div.innerHTML = `
            <input type="text" class="msg-who" placeholder="Name">
            <input type="text" class="msg-class" placeholder="Klasse">
            <input type="text" class="msg-text" placeholder="Grund / Nachricht">
            <input type="date" class="msg-until" title="Gültig bis">
            <button class="btn btn-del" onclick="this.parentElement.remove()">✕</button>
        `;
        document.getElementById('msgContainer').appendChild(div);
    }

    function sendData() {
        const status = document.getElementById('status');
        const btn = document.querySelector('.btn-send');
        
        status.innerText = "Wird gesendet...";
        btn.disabled = true;

        const entries = [];
        document.querySelectorAll('.info-row').forEach(row => {
            const name = row.querySelector('.msg-who').value.trim();
            const klasse = row.querySelector('.msg-class').value.trim();
            const reason = row.querySelector('.msg-text').value.trim();
            const until = row.querySelector('.msg-until').value;

            if(name && reason) {
                entries.push({ 
                    von: name, 
                    klasse: klasse, 
                    nachricht: reason, 
                    gueltig_bis: until || "unbefristet" 
                });
            }
        });

        if (entries.length === 0) {
            status.innerText = "Bitte mindestens Name und Grund ausfüllen.";
            status.style.color = "#ef4444";
            btn.disabled = false;
            return;
        }

        const templateParams = {
            message: JSON.stringify(entries, null, 4),
            to_name: "Admin",
            subject: "Update Info-Board: " + entries.length + " neue Meldung(en)",
            timestamp: new Date().toLocaleString('de-DE')
        };

        emailjs.send('lernarchiv', 'template_ezdxxvk', templateParams)
            .then(() => {
                status.style.color = "#22c55e";
                status.innerText = "Erfolgreich eingereicht!";
                // Setzt das Formular zurück
                setTimeout(() => location.reload(), 2000);
            }, (err) => {
                status.style.color = "#ef4444";
                status.innerText = "Fehler: " + JSON.stringify(err);
                btn.disabled = false;
            });
    }
</script>
</body>
</html>
