<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schul-Display JSON-LIVE</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --highlight: #22c55e;
            --warning: #ef4444; --pause: #f59e0b; --uli: #a855f7;
        }
        * { box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header & Uhr */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 40px; background: var(--panel); border-bottom: 4px solid var(--accent); height: 120px; }
        .live-time { font-size: 4.5rem; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
        .seconds { font-size: 2rem; color: var(--accent); margin-left: 5px; }
        .uli-card { background: var(--uli); padding: 15px; border-radius: 12px; border-left: 8px solid white; min-width: 400px; }

        /* Ticker / Impuls */
        #msg-ticker { background: var(--accent); color: var(--bg); padding: 10px; font-size: 2rem; font-weight: bold; text-align: center; height: 70px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .urgent { background: var(--warning) !important; color: white !important; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        main { flex: 1; padding: 25px; }
        #content-area { height: 100%; width: 100%; }

        /* Animation */
        .fade { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Layout Elemente */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; height: 100%; }
        .big-card { background: var(--panel); border-radius: 20px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 12px solid var(--accent); text-align: center; }
        .lehrer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; margin-top: 20px; }
        .lehrer-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border-left: 4px solid var(--highlight); }
        
        table { width: 100%; height: 100%; border-collapse: collapse; background: var(--panel); table-layout: fixed; }
        th { background: #334155; color: var(--accent); padding: 10px; }
        td { border: 1px solid #334155; text-align: center; }
        .active-cell { background: var(--highlight) !important; font-weight: bold; border: 4px solid white; }
    </style>
</head>
<body>

<header>
    <div>
        <div id="view-label" style="background:var(--accent); color:var(--bg); padding:5px 15px; border-radius:5px; font-weight:900; margin-bottom:5px; display:inline-block;">MODUS</div>
        <div id="live-date" style="font-size: 1.5rem; opacity: 0.8;">---</div>
    </div>
    <div class="uli-card">
        <small style="text-transform: uppercase; font-weight: 800; opacity: 0.7;">Nachrichten Uli</small>
        <div id="uli-content" style="font-size: 1.3rem; font-weight: bold;">Lade Daten...</div>
    </div>
    <div class="live-time"><span id="h-m">00:00</span><span id="sec" class="seconds">00</span></div>
</header>

<div id="msg-ticker">Initialisiere...</div>

<main>
    <div id="content-area" class="fade"></div>
</main>

<script>
    let SCHOOL_DATA = { uliMessage: "", lehrer: [], currentSubjects: {} };
    const slots = [
        { s: "08:30", e: "09:00" }, { s: "09:10", e: "09:40" }, 
        { s: "09:50", e: "10:20" }, { s: "10:30", e: "11:00" }, 
        { s: "11:10", e: "11:40" }, { s: "11:50", e: "12:20" }, 
        { s: "12:30", e: "13:00" },
        { s: "13:00", e: "13:35", label: "MITTAGSPAUSE" },
        { s: "13:40", e: "14:10" }, { s: "14:15", e: "14:45" },
        { s: "14:55", e: "15:25" }, { s: "15:30", e: "16:00" }
    ];

    let step = 0;
    const views = ["Live-Status", "Lehrer-Präsenz", "Plan Klasse 10", "Plan Klasse 11", "Plan Klasse 12"];

    // FUNKTION ZUM LADEN DER EXTERNEN JSON
    async function fetchExternalData() {
        try {
            // "data.json?t=" + Date.now() verhindert, dass der Browser alte Daten aus dem Cache lädt
            const response = await fetch('data.json?t=' + Date.now());
            SCHOOL_DATA = await response.json();
            console.log("Daten aktualisiert");
        } catch (e) {
            console.error("Fehler beim Laden der JSON:", e);
        }
    }

    function updateUI() {
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        const day = now.getDay();

        document.getElementById('h-m').textContent = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('sec').textContent = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('live-date').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'long'});
        document.getElementById('uli-content').textContent = SCHOOL_DATA.uliMessage || "Keine Nachrichten.";

        let activeIdx = slots.findIndex(s => {
            const [sh, sm] = s.s.split(':').map(Number);
            const [eh, em] = s.e.split(':').map(Number);
            return curMin >= (sh*60+sm) && curMin < (eh*60+em);
        });

        // Ticker & Impuls Logik
        const ticker = document.getElementById('msg-ticker');
        ticker.classList.remove('urgent');
        let next = slots.find(s => (s.s.split(':').map(Number)[0]*60 + s.s.split(':').map(Number)[1]) > curMin);
        
        if(next && ((next.s.split(':').map(Number)[0]*60 + next.s.split(':').map(Number)[1]) - curMin) <= 5) {
            ticker.textContent = `!! IMPULS: Nächste Stunde in ${ (next.s.split(':').map(Number)[0]*60 + next.s.split(':').map(Number)[1]) - curMin } Min !!`;
            ticker.classList.add('urgent');
        } else {
            ticker.textContent = activeIdx !== -1 ? (slots[activeIdx].label || `Unterricht bis ${slots[activeIdx].e}`) : "Pause / Standby";
        }

        render(activeIdx, day);
    }

    function render(activeIdx, today) {
        const area = document.getElementById('content-area');
        document.getElementById('view-label').textContent = views[step];

        if(step === 0) { // LIVE CARDS
            const timeKey = activeIdx !== -1 ? slots[activeIdx].s : "";
            const data = SCHOOL_DATA.currentSubjects[timeKey] || { "10": "--", "11": "--", "12": "--" };
            area.innerHTML = `<div class="grid-3">` + [10,11,12].map(c => `
                <div class="big-card">
                    <div style="font-size:1.5rem; opacity:0.6">KLASSE</div>
                    <div style="font-size:5.5rem; font-weight:900">${c}</div>
                    <div style="font-size:3rem; color:var(--accent); font-weight:bold">${data[c] || "--"}</div>
                </div>`).join('') + `</div>`;
        } 
        else if(step === 1) { // LEHRER
            area.innerHTML = `<div class="big-card" style="width:100%; height:100%; justify-content:flex-start">
                <h2 style="font-size:3rem; color:var(--accent)">Anwesende Lehrkräfte</h2>
                <div class="lehrer-grid">${(SCHOOL_DATA.lehrer || []).map(l => `<div class="lehrer-box"><b>${l.name}</b><br><small style="color:var(--highlight)">${l.status}</small></div>`).join('')}</div>
            </div>`;
        } 
        else { // TABELLEN
            let html = `<table><thead><tr><th style="width:180px">Zeit</th><th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th></tr></thead><tbody>`;
            slots.forEach((s, i) => {
                const isActRow = (i === activeIdx && today >= 1 && today <= 5);
                html += `<tr><td style="background:rgba(0,0,0,0.2); font-weight:bold">${s.s}-${s.e}</td>`;
                if(s.label) html += `<td colspan="5" style="color:var(--pause); font-weight:bold">${s.label}</td>`;
                else {
                    for(let d=1; d<=5; d++) html += `<td class="${(isActRow && d===today)?'active-cell':''}">Kurs</td>`;
                }
                html += `</tr>`;
            });
            area.innerHTML = html + `</tbody></table>`;
        }
    }

    // VOLLBILD PER KLICK AUF BODY (FÜR DISPLAYS)
    document.body.onclick = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); };

    // INTERVALLE
    setInterval(() => { step = (step + 1) % 5; updateUI(); }, 10000); // 10s Rotation
    setInterval(updateUI, 1000); // 1s Uhr & Impuls
    setInterval(fetchExternalData, 30000); // 30s JSON Refresh

    // INITIALER START
    fetchExternalData().then(() => updateUI());
</script>
</body>
</html>
