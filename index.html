<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Display PREMIUM</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --highlight: #22c55e;
            --warning: #ef4444; --pause: #f59e0b; --uli: #a855f7;
            --glass: rgba(255, 255, 255, 0.03);
        }
        * { box-sizing: border-box; cursor: none; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: var(--panel); border-bottom: 4px solid var(--accent); height: 120px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; }
        .live-time { font-size: 5rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -2px; }
        .seconds { font-size: 2rem; color: var(--accent); margin-left: 5px; opacity: 0.7; }
        
        .uli-card { background: linear-gradient(135deg, var(--uli), #7e22ce); padding: 18px; border-radius: 15px; border-left: 8px solid #fff; min-width: 450px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        #msg-ticker { background: var(--accent); color: var(--bg); font-size: 2.2rem; font-weight: 900; text-align: center; height: 80px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; letter-spacing: 1px; }
        .urgent { background: var(--warning) !important; color: white !important; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { background: #ef4444; } 50% { background: #991b1b; } 100% { background: #ef4444; } }

        main { flex: 1; padding: 30px; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        
        /* Plan-Design */
        table { width: 100%; height: 100%; border-collapse: separate; border-spacing: 8px; table-layout: fixed; }
        th { background: var(--glass); color: var(--accent); font-size: 1.4rem; text-transform: uppercase; padding: 10px; border-radius: 10px; }
        td { background: var(--glass); border-radius: 10px; text-align: center; font-size: 1.3rem; border: 1px solid rgba(255,255,255,0.05); transition: all 0.5s ease; }
        
        .active-cell { 
            background: var(--highlight) !important; 
            color: white !important; 
            font-weight: 900; 
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
            border: 2px solid #fff !important;
        }

        .time-col { background: rgba(0,0,0,0.3); font-weight: bold; color: var(--accent); width: 140px; }
        .pause-row { color: var(--pause); font-weight: bold; letter-spacing: 5px; font-size: 1rem; }

        .big-card { background: var(--panel); border-radius: 30px; border-top: 15px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .lehrer-box { background: var(--glass); border-left: 8px solid var(--highlight); padding: 20px; border-radius: 15px; }

        .fade { animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <div>
        <div id="view-label" style="background:var(--accent); color:var(--bg); padding:4px 12px; border-radius:6px; font-weight:900; text-transform: uppercase; font-size:0.9rem;">STATUS</div>
        <div id="live-date" style="font-size: 1.6rem; margin-top:5px; font-weight:300;">---</div>
    </div>
    <div class="uli-card">
        <small style="text-transform: uppercase; font-weight: 900; opacity: 0.7; font-size: 0.7rem; letter-spacing: 1px;">Informationen</small>
        <div id="uli-content" style="font-size: 1.5rem; font-weight: 600; margin-top: 4px;">Lade Daten...</div>
    </div>
    <div class="live-time"><span id="h-m">00:00</span><span id="sec" class="seconds">00</span></div>
</header>

<div id="msg-ticker">System Initialisierung...</div>

<main id="content-area" class="fade"></main>

<script>
    // --- TEST-MODUS ---
    // Ändere 'false' zu 'true', um eine eigene Zeit zu simulieren:
    const TEST_MODE = false; 
    const TEST_TIME = "09:20"; // Deine Wunsch-Uhrzeit zum Testen
    const TEST_DAY = 1;        // 1=Mo, 2=Di, 3=Mi, 4=Do, 5=Fr
    // ------------------

    let SCHOOL_DATA = { uliMessage: "", lehrerPlan: [], fullSchedules: {} };
    const slots = [
        { s: "08:30", e: "09:00" }, { s: "09:10", e: "09:40" }, { s: "09:50", e: "10:20" }, 
        { s: "10:30", e: "11:00" }, { s: "11:10", e: "11:40" }, { s: "11:50", e: "12:20" }, 
        { s: "12:30", e: "13:00" }, { s: "13:00", e: "13:35", label: "MITTAGSPAUSE" },
        { s: "13:40", e: "14:10" }, { s: "14:15", e: "14:45" }, { s: "14:55", e: "15:25" }, { s: "15:30", e: "16:00" }
    ];

    let step = 0;
    const views = ["Live-Status", "Lehrer-Präsenz", "10", "11", "12"];

    async function fetchData() {
        try {
            const resp = await fetch('data.json?t=' + Date.now());
            SCHOOL_DATA = await resp.json();
        } catch (e) { console.error("Datenfehler"); }
    }

    function update() {
        const now = new Date();
        let h, m, day;

        if (TEST_MODE) {
            [h, m] = TEST_TIME.split(':').map(Number);
            day = TEST_DAY;
        } else {
            h = now.getHours(); m = now.getMinutes(); day = now.getDay();
        }

        const curMin = h * 60 + m;

        document.getElementById('h-m').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        document.getElementById('sec').textContent = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('live-date').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'long'});
        document.getElementById('uli-content').textContent = SCHOOL_DATA.uliMessage || "Keine neuen Nachrichten.";

        let activeIdx = slots.findIndex(s => {
            const [sh, sm] = s.s.split(':').map(Number);
            const [eh, em] = s.e.split(':').map(Number);
            return curMin >= (sh*60+sm) && curMin < (eh*60+em);
        });

        const ticker = document.getElementById('msg-ticker');
        ticker.classList.remove('urgent');
        let next = slots.find(s => (s.s.split(':').map(Number)[0]*60 + s.s.split(':').map(Number)[1]) > curMin);
        
        if(next && ((next.s.split(':').map(Number)[0]*60 + next.s.split(':').map(Number)[1]) - curMin) <= 5) {
            ticker.textContent = `Nächste Stunde in ${ (next.s.split(':').map(Number)[0]*60 + next.s.split(':').map(Number)[1]) - curMin } Min`;
            ticker.classList.add('urgent');
        } else {
            ticker.textContent = activeIdx !== -1 ? (slots[activeIdx].label || `Aktuelle Stunde bis ${slots[activeIdx].e}`) : "Pause / Standby";
        }

        render(activeIdx, day, curMin);
    }

    function render(activeIdx, today, curMin) {
        const area = document.getElementById('content-area');
        const v = views[step];
        const timeKey = activeIdx !== -1 ? slots[activeIdx].s : "";
        document.getElementById('view-label').textContent = isNaN(v) ? v : "STUNDENPLAN KLASSE " + v;

        if(step === 0) {
            area.innerHTML = `<div class="grid-3" style="height:100%">` + [10,11,12].map(c => {
                let fach = (SCHOOL_DATA.fullSchedules[c] && SCHOOL_DATA.fullSchedules[c][today]) ? SCHOOL_DATA.fullSchedules[c][today][timeKey] || "--" : "--";
                return `<div class="big-card fade" style="display:flex; flex-direction:column; justify-content:center; align-items:center;">
                    <div style="font-size:1.5rem; opacity:0.5; font-weight:800">KLASSE</div>
                    <div style="font-size:9rem; font-weight:900; line-height:1; margin:20px 0;">${c}</div>
                    <div style="font-size:3.5rem; color:var(--accent); font-weight:bold">${fach}</div>
                </div>`;
            }).join('') + `</div>`;
        } 
        else if(step === 1) {
            let html = `<div class="big-card fade" style="height:100%; padding:40px; justify-content:flex-start; align-items:stretch;">
                <h2 style="font-size:3rem; margin:0 0 30px 0; color:var(--accent)">Lehrkräfte im Dienst</h2>
                <div class="lehrer-grid">`;
            let c = 0;
            (SCHOOL_DATA.lehrerPlan || []).forEach(l => {
                let here = false;
                if(l.zeiten && l.zeiten[today]) {
                    l.zeiten[today].forEach(s => {
                        const [sh, sm] = s[0].split(':').map(Number);
                        const [eh, em] = s[1].split(':').map(Number);
                        if(curMin >= (sh*60+sm) && curMin < (eh*60+em)) here = true;
                    });
                }
                if(here) {
                    c++;
                    html += `<div class="lehrer-box">${l.fokus ? `<div class="class-badge">${l.fokus}</div>` : ""}
                        <div style="font-size:1.8rem; font-weight:bold">${l.name}</div>
                        <div style="color:var(--highlight); font-weight:bold; margin-top:5px;">AKTIV</div>
                    </div>`;
                }
            });
            area.innerHTML = (c===0 ? html + `<div style="font-size:2rem; opacity:0.3">Keine Lehrkräfte im Haus</div>` : html) + `</div></div>`;
        } 
        else {
            const cid = views[step];
            let table = `<table><thead><tr><th style="width:150px">Zeit</th><th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th></tr></thead><tbody>`;
            slots.forEach((s, i) => {
                const isRow = (i === activeIdx);
                table += `<tr><td class="time-col">${s.s}</td>`;
                if(s.label) {
                    table += `<td colspan="5" class="pause-row ${isRow && today>=1 && today<=5 ? 'active-cell' : ''}">${s.label}</td>`;
                } else {
                    for(let d=1; d<=5; d++) {
                        const active = (isRow && d === today);
                        const txt = (SCHOOL_DATA.fullSchedules[cid] && SCHOOL_DATA.fullSchedules[cid][d]) ? SCHOOL_DATA.fullSchedules[cid][d][s.s] || "" : "";
                        table += `<td class="${active ? 'active-cell' : ''}">${txt}</td>`;
                    }
                }
                table += `</tr>`;
            });
            area.innerHTML = table + `</tbody></table>`;
        }
    }

    setInterval(() => { step = (step + 1) % views.length; update(); }, 10000);
    setInterval(update, 1000);
    fetchData().then(update);
    setInterval(fetchData, 30000);
</script>
</body>
</html>
