<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --highlight: #22c55e;
            --warning: #ef4444; --pause: #f59e0b; --info-color: #a855f7;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; cursor: none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: var(--panel); border-bottom: 4px solid var(--accent); height: 120px; z-index: 10; }
        .live-time { font-size: 5rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        .seconds { font-size: 2rem; color: var(--accent); margin-left: 5px; opacity: 0.7; }
        
        .info-card { 
            background: linear-gradient(135deg, var(--info-color), #7e22ce); 
            padding: 10px 30px; border-radius: 15px; border-left: 8px solid #fff; 
            min-width: 450px; height: 80px; display: flex; align-items: center; justify-content: center; text-align: center;
        }

        #msg-ticker { background: var(--accent); color: var(--bg); font-size: 1.8rem; font-weight: 800; text-align: center; height: 80px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; padding: 0 40px; line-height: 1.2; }
        .urgent { background: var(--warning) !important; color: white !important; font-size: 2.2rem !important; }

        main { flex: 1; padding: 25px; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        
        table { width: 100%; height: 100%; border-collapse: separate; border-spacing: 8px; table-layout: fixed; }
        th { background: var(--glass); color: var(--accent); font-size: 1.3rem; padding: 10px; border-radius: 10px; }
        td { background: var(--glass); border-radius: 10px; text-align: center; font-size: 1.4rem; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        
        .active-cell { 
            background: var(--highlight) !important; color: white !important; font-weight: 900; 
            border: 4px solid #fff !important; box-shadow: 0 0 30px rgba(34, 197, 94, 0.4); transform: scale(1.02);
        }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; height: 100%; }
        .big-card { background: var(--panel); border-radius: 25px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 12px solid var(--accent); text-align: center; height: 100%; position: relative; }
        
        .timer-box { background: rgba(0,0,0,0.3); padding: 15px 30px; border-radius: 15px; color: var(--highlight); font-weight: 800; font-size: 3rem; margin-top: 20px; border: 2px solid var(--highlight); min-width: 220px; }
        
        .lehrer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; }
        .lehrer-box { background: var(--glass); border-left: 10px solid var(--highlight); padding: 25px; border-radius: 20px; position: relative; }
        .class-badge { position: absolute; top: 10px; right: 15px; background: var(--accent); color: var(--bg); padding: 4px 10px; border-radius: 8px; font-weight: 900; }

        .fade { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body onclick="document.documentElement.requestFullscreen()">

<header>
    <div>
        <div id="view-label" style="background:var(--accent); color:var(--bg); padding:5px 15px; border-radius:8px; font-weight:900; text-transform: uppercase;">STATUS</div>
        <div id="live-date" style="font-size: 1.8rem; margin-top:8px;">---</div>
    </div>
    <div class="info-card">
        <div id="info-content" style="font-size: 1.6rem; font-weight: 700;">Lade Daten...</div>
    </div>
    <div class="live-time"><span id="h-m">00:00</span><span id="sec" class="seconds">00</span></div>
</header>

<div id="msg-ticker">System aktiv</div>

<main id="content-area" class="fade"></main>

<script>
    const quotes = [
        "Focus on.", "Stay focused.", "Viel Erfolg heute.",
        "\"Der größte Feind des Fortschritts ist nicht der Irrtum, sondern die Trägheit.\" – Henry Thomas Buckle",
        "\"Suche nicht nach Fehlern, suche nach Lösungen.\" – Henry Ford",
        "\"Dummheit ist auch eine natürliche Begabung.\" – Wilhelm Busch",
        "\"Folge dem Nick, denn er wird dir den Weg leiten.\" - Lena",
        "Tipp: Holt euch die Classroom-App fürs Handy",
        "\"Vertrauen beruht auf Gegenseitigkeit.\" - Nick",
        "\"Vertrauen ist gut - Kontrolle ist besser\" - Lena",
        "Ich hab ne 4, aber eigentlich wär das ne 2"
    ];

    let currentQuote = quotes[0];
    let SCHOOL_DATA = { uliMessage: "", infoSlideText: "", lehrerPlan: [], fullSchedules: {} };
    
    const slots = [
        { s: "08:30", e: "09:00" }, { s: "09:10", e: "09:40" }, { s: "09:50", e: "10:20" }, 
        { s: "10:30", e: "11:00" }, { s: "11:10", e: "11:40" }, { s: "11:50", e: "12:20" }, 
        { s: "12:30", e: "13:00" }, { s: "13:00", e: "13:35", label: "MITTAGSPAUSE" },
        { s: "13:40", e: "14:10" }, { s: "14:15", e: "14:45" }, { s: "14:55", e: "15:25" }, { s: "15:30", e: "16:00" }
    ];

    let step = 0;
    const views = ["Live-Status", "Information", "Lehrer-Präsenz", "10", "11", "12"];

    async function fetchData() {
        try {
            const resp = await fetch('data.json?t=' + Date.now());
            SCHOOL_DATA = await resp.json();
        } catch (e) { console.error("Datenfehler"); }
    }

    function timeToMin(t) {
        if(!t) return 0;
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    function getNextImpulse(classId, currentDay, currentMin) {
        let checkDay = currentDay;
        for (let i = 0; i < 8; i++) {
            if (checkDay > 5 || checkDay === 0) { checkDay = 1; }
            const dayPlan = SCHOOL_DATA.fullSchedules[classId]?.[checkDay];
            if (dayPlan) {
                const sorted = slots.filter(s => !s.label).sort((a,b) => timeToMin(a.s) - timeToMin(b.s));
                for (let slot of sorted) {
                    const startMin = timeToMin(slot.s);
                    if (i === 0 && currentMin > (startMin + 3)) continue;
                    const fach = dayPlan[slot.s];
                    if (fach && fach.trim() !== "") return { fach, day: checkDay, time: slot.s, dayOffset: i, startMin: startMin };
                }
            }
            checkDay = (checkDay + 1) % 7;
        }
        return null;
    }

    function update() {
        const now = new Date();
        const h = now.getHours(), m = now.getMinutes(), day = now.getDay(), curMin = h * 60 + m;

        document.getElementById('h-m').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        document.getElementById('sec').textContent = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('live-date').textContent = now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'long'});
        document.getElementById('info-content').textContent = SCHOOL_DATA.uliMessage || "";

        const ticker = document.getElementById('msg-ticker');
        ticker.classList.remove('urgent');
        
        let activeIdx = slots.findIndex(s => curMin >= timeToMin(s.s) && curMin < timeToMin(s.e));
        let nextS = slots.find(s => timeToMin(s.s) > curMin);
        
        if(nextS && (timeToMin(nextS.s) - curMin) <= 5 && !nextS.label) {
            let imp = [];
            ["10","11","12"].forEach(cid => {
                const f = SCHOOL_DATA.fullSchedules[cid]?.[day]?.[nextS.s];
                if(f && f.trim() !== "") imp.push(`${cid}: ${f}`);
            });
            if(imp.length > 0) {
                ticker.textContent = `Impuls in ${timeToMin(nextS.s) - curMin} Min: ${imp.join(' | ')}`;
                ticker.classList.add('urgent');
            } else { setStatusText(ticker, h, activeIdx); }
        } else { setStatusText(ticker, h, activeIdx); }

        render(activeIdx, day, curMin);
    }

   function setStatusText(element, hour, activeIdx) {
    if (hour >= 16) {
        element.textContent = "Standby / Feierabend";
    } else if (hour >= 8) {
        // Wenn ein Slot aktiv ist UND dieser ein Label hat (z.B. MITTAGSPAUSE), zeige das Label
        if (activeIdx !== -1 && slots[activeIdx].label) {
            element.textContent = slots[activeIdx].label;
        } else {
            // In allen anderen Fällen während der Schulzeit (auch während Impulsen): Zeige Zitate
            element.textContent = currentQuote;
        }
    } else {
        element.textContent = "Guten Morgen! Bald geht's los...";
    }
}




    
    function render(activeIdx, today, curMin) {
        const area = document.getElementById('content-area');
        const v = views[step];
        document.getElementById('view-label').textContent = isNaN(v) ? v : "PLAN KLASSE " + v;

        if (v === "Information") {
            const info = SCHOOL_DATA.infoSlideText || "Aktuell keine neuen Informationen.";
            area.innerHTML = `
                <div class="big-card" style="justify-content: flex-start; padding: 60px; text-align: left; align-items: flex-start;">
                    <h2 style="font-size: 3rem; color: var(--accent); margin-bottom: 30px; border-bottom: 2px solid var(--accent); width: 100%; padding-bottom: 10px;">Informationen</h2>
                    <div style="font-size: 2.2rem; line-height: 1.5; white-space: pre-wrap; width: 100%; overflow-y: auto;">${info}</div>
                </div>`;
        } 
        else if (step === 0) { // Live-Status
            let html = `<div class="grid-3">`;
            [10,11,12].forEach(c => {
                const next = getNextImpulse(c.toString(), today, curMin);
                let content = "";
                if (next) {
                    const totalDiff = (next.dayOffset * 1440) + (next.startMin - curMin);
                    let displayTime = totalDiff <= 3 && next.dayOffset === 0 ? "JETZT" : (totalDiff > 60 ? Math.floor(totalDiff/60)+"h "+(totalDiff%60)+"m" : totalDiff+"m");
                    const dayLabel = next.dayOffset === 0 ? "Heute" : (next.dayOffset === 1 ? "Morgen" : ["So","Mo","Di","Mi","Do","Fr","Sa"][next.day]);
                    content = `<div style="opacity:0.6; font-size:1.4rem;">${dayLabel} ${next.time}</div><div style="font-size:3.5rem; color:var(--accent); font-weight:900; margin:20px 0;">${next.fach}</div><div class="timer-box" style="${displayTime==='JETZT'?'background:var(--highlight);color:white;animation:pulse 1s infinite':''}">${displayTime}</div>`;
                } else content = `<div style="opacity:0.3; font-size:1.5rem;">Keine weiteren Impulse</div>`;
                html += `<div class="big-card"><div style="position:absolute; top:20px; left:25px; font-size:1.8rem; font-weight:900; opacity:0.2">KLASSE ${c}</div>${content}</div>`;
            });
            area.innerHTML = html + `</div>`;
        } 
        else if (v === "Lehrer-Präsenz") {
            let html = `<div class="big-card" style="justify-content:flex-start; align-items:stretch; padding:45px;"><h2 style="font-size:2.5rem; margin-bottom:30px; color:var(--accent)">Lehrkräfte im Haus</h2><div class="lehrer-grid">`;
            let fnd = 0;
            (SCHOOL_DATA.lehrerPlan || []).forEach(l => {
                let foc = ""; let here = false;
                if(l.zeiten?.[today]) l.zeiten[today].forEach(s => { if(curMin >= timeToMin(s[0]) && curMin < timeToMin(s[1])) { here = true; foc = s[2] || ""; } });
                if(here) { fnd++; html += `<div class="lehrer-box">${foc?`<div class="class-badge">${foc}</div>`:""}<b style="font-size: 1.6rem; display: block;">${l.name}</b><div style="color:var(--accent);font-weight:600;margin-top:5px;">${l.fach}</div></div>`; }
            });
            area.innerHTML = (fnd === 0 ? html + `<div style="font-size:2rem; opacity:0.2; text-align:center; width:100%; margin-top:50px;">Keine Lehrkräfte im Haus</div>` : html) + `</div></div>`;
        } 
        else { // Klassenpläne
            const cid = views[step];
            let table = `<table><thead><tr><th style="width:160px">Zeit</th><th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th></tr></thead><tbody>`;
            slots.forEach((slot) => {
                const isTimeActive = (curMin >= timeToMin(slot.s) && curMin < timeToMin(slot.e));
                table += `<tr><td style="background:rgba(0,0,0,0.3); font-weight:bold; color:var(--accent)">${slot.s}</td>`;
                if(slot.label) table += `<td colspan="5" class="${isTimeActive && today>=1 && today<=5 ? 'active-cell' : ''}" style="color:var(--pause); font-weight:bold">${slot.label}</td>`;
                else for(let d=1; d<=5; d++) table += `<td class="${isTimeActive && d===today ? 'active-cell' : ''}">${SCHOOL_DATA.fullSchedules[cid]?.[d]?.[slot.s] || ""}</td>`;
                table += `</tr>`;
            });
            area.innerHTML = table + `</tbody></table>`;
        }
    }

    setInterval(() => { 
        step = (step + 1) % views.length; 
        const area = document.getElementById('content-area');
        area.classList.remove('fade'); void area.offsetWidth; area.classList.add('fade');
        update(); 
    }, 10000);

    setInterval(() => { currentQuote = quotes[Math.floor(Math.random() * quotes.length)]; }, 45 * 60 * 1000); 
    currentQuote = quotes[Math.floor(Math.random() * quotes.length)];
    
    setInterval(update, 1000);
    fetchData().then(update);
    setInterval(fetchData, 30000);
</script>
</body>
</html>
