<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schul-Plan</title>
    <style>
        :root { --bg: #000; --card: #1a1a1a; --accent: #007bff; --text: #fff; --grey: #888; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; }

        /* News Box statt Ticker */
        .news-box { background: #222; border: 1px solid var(--accent); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; }
        .news-title { color: var(--accent); font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }

        /* Impuls Timer */
        .impuls-area { text-align: center; margin-bottom: 20px; padding: 15px; background: var(--card); border-radius: 12px; }
        .timer { font-size: 3rem; font-weight: bold; color: var(--accent); }

        /* Navigation Tabs */
        .tabs { display: flex; background: #111; padding: 5px; border-radius: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; background: none; color: var(--grey); padding: 10px; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { background: var(--card); color: #fff; border-radius: 8px; }

        .page { display: none; }
        .page.active { display: block; }

        /* Lehrer Liste - Extrem Kompakt */
        .l-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .l-table th { text-align: left; color: var(--grey); font-size: 0.7rem; padding: 5px; border-bottom: 1px solid #333; }
        .l-table td { padding: 10px 5px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .now-badge { background: #28a745; color: #000; padding: 2px 5px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .k11-tag { color: #a855f7; font-weight: bold; }

        /* Plan Liste */
        .plan-item { display: flex; justify-content: space-between; padding: 12px; background: var(--card); margin-bottom: 5px; border-radius: 8px; }
        .day-nav { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; }
        .day-btn { background: #222; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; font-size: 0.7rem; }
        .day-btn.active { background: var(--accent); }
    </style>
</head>
<body>

<div class="news-box">
    <div class="news-title">Short Messages</div>
    <div id="msg-list">Keine Nachrichten</div>
</div>

<div class="impuls-area">
    <div style="font-size: 0.7rem; color: var(--grey);">NÄCHSTER IMPULS IN</div>
    <div class="timer" id="timer">--:--</div>
    <div id="next-info" style="font-size: 0.9rem;">Lade...</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="showPage('plan', this)">STUNDENPLAN</button>
    <button class="tab-btn" onclick="showPage('lehrer', this)">LEHRER-STATUS</button>
</div>

<div id="page-plan" class="page active">
    <div class="day-nav">
        <button class="day-btn active" onclick="setPlanDay(1, this)">MO</button>
        <button class="day-btn" onclick="setPlanDay(2, this)">DI</button>
        <button class="day-btn" onclick="setPlanDay(3, this)">MI</button>
        <button class="day-btn" onclick="setPlanDay(4, this)">DO</button>
        <button class="day-btn" onclick="setPlanDay(5, this)">FR</button>
    </div>
    <div id="plan-content"></div>
</div>

<div id="page-lehrer" class="page">
    <table class="l-table">
        <thead>
            <tr>
                <th>LEHRER</th>
                <th>HEUTE ANWESEND</th>
            </tr>
        </thead>
        <tbody id="lehrer-tbody"></tbody>
    </table>
</div>

<script>
    let DATA = {};
    let currentDay = new Date().getDay() || 1;
    if(currentDay > 5) currentDay = 1;

    async function init() {
        const r = await fetch('data.json?t=' + Date.now());
        DATA = await r.json();
        
        document.getElementById('msg-list').innerText = DATA.shortMessages.join(" | ") || "Alles normal.";
        renderLehrer();
        renderPlan(currentDay);
        tick();
    }

    function showPage(p, btn) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        btn.classList.add('active');
    }

    function setPlanDay(d, btn) {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPlan(d);
    }

    function renderPlan(d) {
        const p = DATA.fullSchedules["11"][d] || {};
        document.getElementById('plan-content').innerHTML = Object.keys(p).sort().map(t => `
            <div class="plan-item">
                <span style="color:var(--accent); font-weight:bold;">${t}</span>
                <span>${p[t]}</span>
            </div>
        `).join('');
    }

    function renderLehrer() {
        const today = new Date().getDay();
        const curMin = new Date().getHours() * 60 + new Date().getMinutes();
        
        document.getElementById('lehrer-tbody').innerHTML = DATA.lehrerPlan.map(l => {
            let times = l.zeiten[today] || [];
            let isPresent = times.some(z => curMin >= toMin(z[0]) && curMin < toMin(z[1]));
            
            let timeString = times.filter(z => z[0]).map(z => 
                `<span class="${z[2]=='11'?'k11-tag':''}">${z[0]}-${z[1]}</span>`
            ).join(", ");

            return `
                <tr>
                    <td>
                        <b>${l.name}</b><br>
                        <small style="color:var(--grey)">${l.fach}</small>
                    </td>
                    <td>
                        ${isPresent ? '<span class="now-badge">JETZT DA</span><br>' : ''}
                        <div style="font-size:0.75rem; margin-top:3px;">${timeString || 'Kein Dienst'}</div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function tick() {
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        const plan = DATA.fullSchedules["11"][now.getDay()] || {};
        
        let next = null;
        Object.keys(plan).sort().forEach(t => { if(toMin(t) > curMin && !next) next = t; });

        if(next) {
            let diff = toMin(next) - curMin;
            document.getElementById('timer').innerText = diff + " MIN";
            document.getElementById('next-info').innerText = "Bis: " + plan[next];
        } else {
            document.getElementById('timer').innerText = "--";
            document.getElementById('next-info').innerText = "Keine Stunden mehr";
        }
        setTimeout(tick, 30000);
    }

    const toMin = t => { if(!t) return 0; const [h,m] = t.split(':').map(Number); return h*60+m; };
    init();
</script>
</body>
</html>
