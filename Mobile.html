<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lehrer-Plan Pro</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --highlight: #22c55e;
            --k11: #a855f7; --glass: rgba(255, 255, 255, 0.05);
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }

        header { text-align: center; padding: 15px; background: var(--panel); border-bottom: 3px solid var(--accent); }
        .time { font-size: 1.8rem; font-weight: 800; }
        #ticker { background: #334155; font-size: 0.8rem; padding: 5px; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--glass); z-index: 1000; }
        .nav-item { font-size: 0.7rem; text-align: center; opacity: 0.6; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--accent); font-weight: bold; }

        .page { display: none; padding: 15px; }
        .page.active { display: block; }

        /* Lehrer Cards & Details */
        .lehrer-card { background: var(--panel); border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #444; cursor: pointer; }
        .lehrer-card.active-now { border-left-color: var(--highlight); background: #1e2e45; }
        .details { display: none; margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; font-size: 0.8rem; }
        .details.show { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tag-11 { color: var(--k11); font-weight: bold; }

        /* Plan UI */
        .selector-row { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .btn { background: #334155; border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; white-space: nowrap; }
        .btn.active { background: var(--accent); color: var(--bg); }

        .plan-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; background: var(--panel); border-radius: 8px; }
        .plan-table td, .plan-table th { padding: 10px; border-bottom: 1px solid var(--glass); }
        .plan-table th { text-align: left; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div id="date-display" style="font-size: 0.8rem; opacity: 0.7;">---</div>
    <div class="time" id="clock">00:00</div>
</header>
<div id="ticker"><div class="ticker-move" id="msg-container">Lade Meldungen...</div></div>

<section id="p-live" class="page active">
    <div id="lehrer-list"></div>
</section>

<section id="p-plan" class="page">
    <div class="selector-row" id="class-btns"></div>
    <div class="selector-row" id="day-btns"></div>
    <div id="plan-view"></div>
</section>

<nav>
    <div class="nav-item active" onclick="tab('live')"><span>⚡</span><br>STATUS</div>
    <div class="nav-item" onclick="tab('plan')"><span>📅</span><br>WOCHE</div>
</nav>

<script>
    let data = {};
    let curClass = "11";
    let curDay = new Date().getDay() || 1; // Falls Sonntag, dann Montag zeigen
    if(curDay > 5) curDay = 1;

    async function load() {
        const r = await fetch('data.json?v=' + Date.now());
        data = await r.json();
        
        // Short Messages
        const msgs = data.shortMessages && data.shortMessages.length > 0 ? data.shortMessages.join(" +++ ") : "Keine neuen Meldungen";
        document.getElementById('msg-container').innerText = "+++ " + msgs + " +++";

        renderLehrer();
        renderPlanUI();
        updateClock();
    }

    function renderLehrer() {
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        const today = now.getDay();
        const container = document.getElementById('lehrer-list');
        
        container.innerHTML = data.lehrerPlan.map((l, idx) => {
            let presentNow = false;
            let timeInfo = "";
            
            // Check current status
            if(l.zeiten[today]) {
                l.zeiten[today].forEach(z => {
                    if(curMin >= timeToMin(z[0]) && curMin < timeToMin(z[1])) presentNow = true;
                });
            }

            // Build detailed schedule
            let scheduleHtml = "";
            [1,2,3,4,5].forEach(d => {
                const daySlots = (l.zeiten[d] || []).filter(z => z[0] !== "");
                if(daySlots.length > 0) {
                    scheduleHtml += `<div style="margin-top:5px; color:var(--accent)">${["","Mo","Di","Mi","Do","Fr"][d]}:</div>`;
                    daySlots.forEach(z => {
                        scheduleHtml += `
                            <div class="detail-row">
                                <span>${z[0]} - ${z[1]}</span>
                                <span class="${z[2]==='11'?'tag-11':''}">${z[2] ? 'Klasse '+z[2] : 'Andere'}</span>
                            </div>`;
                    });
                }
            });

            return `
                <div class="lehrer-card ${presentNow?'active-now':''}" onclick="toggleDet(${idx})">
                    <div style="display:flex; justify-content:space-between">
                        <b>${l.name}</b>
                        <small style="opacity:0.6">${l.fach}</small>
                    </div>
                    <div id="det-${idx}" class="details">${scheduleHtml || 'Keine festen Zeiten'}</div>
                </div>
            `;
        }).join('');
    }

    function renderPlanUI() {
        const classes = Object.keys(data.fullSchedules);
        document.getElementById('class-btns').innerHTML = classes.map(c => 
            `<button class="btn ${curClass===c?'active':''}" onclick="setClass('${c}')">Klasse ${c}</button>`
        ).join('');

        const days = ["Mo", "Di", "Mi", "Do", "Fr"];
        document.getElementById('day-btns').innerHTML = days.map((d, i) => 
            `<button class="btn ${curDay===(i+1)?'active':''}" onclick="setDay(${i+1})">${d}</button>`
        ).join('');

        const dayPlan = data.fullSchedules[curClass][curDay] || {};
        let html = `<table class="plan-table"><tr><th>Uhrzeit</th><th>Fach</th></tr>`;
        Object.keys(dayPlan).sort().forEach(t => {
            html += `<tr><td>${t}</td><td>${dayPlan[t]}</td></tr>`;
        });
        document.getElementById('plan-view').innerHTML = html + `</table>`;
    }

    function setClass(c) { curClass = c; renderPlanUI(); }
    function setDay(d) { curDay = d; renderPlanUI(); }
    function tab(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function toggleDet(i) { document.getElementById('det-'+i).classList.toggle('show'); }
    function timeToMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
    
    function updateClock() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('date-display').innerText = n.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'long'});
    }

    setInterval(updateClock, 1000);
    load();
</script>
</body>
</html>
